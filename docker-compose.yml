version: '3.8'

services:
  # Backend Game Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: trapstep-server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - trapstep-network

  # Frontend Web App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trapstep-web
    ports:
      - "80:80"
    environment:
      - VITE_SERVER_URL=http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trapstep-network

networks:
  trapstep-network:
    driver: bridge

# Volumes for persistence (optional)
volumes:
  server-data:
