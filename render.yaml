# Render.com 자동 배포 설정
# GitHub에 푸시하면 자동으로 배포됨

services:
  # 백엔드 서버
  - type: web
    name: trapstep-server
    env: node
    region: singapore
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
    healthCheckPath: /health

  # 프론트엔드 (정적 사이트)
  - type: web
    name: trapstep-web
    env: static
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SERVER_URL
        fromService:
          type: web
          name: trapstep-server
          property: host
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
